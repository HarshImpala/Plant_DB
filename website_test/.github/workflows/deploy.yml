name: Build & Deploy Plant Encyclopedia

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/deploy.yml"
      - "generator/**"
      - "templates/**"
      - "static/**"
      - "data/**"
  pull_request:
    branches: [main]
    paths:
      - ".github/workflows/deploy.yml"
      - "generator/**"
      - "templates/**"
      - "static/**"
      - "data/**"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install jinja2

      - name: Validate data integrity
        run: python generator/validate_data.py

      - name: Build site
        run: python generator/build_site.py
        env:
          PLACEHOLDER_IMAGES: "1"
          SITE_BASE_URL: "https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}"

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: output

  deploy:
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
